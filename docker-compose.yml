services:
  db:
    image: postgres:16-alpine
    container_name: eventshandler-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-events}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-events}
      POSTGRES_DB: ${POSTGRES_DB:-events}
    # Публикуем только на loopback: БД недоступна из интернета (безопасно для хостинга),
    # но доступна локально на 127.0.0.1:5432 для разработки и инструментов.
    ports:
      - "127.0.0.1:${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-events} -d ${POSTGRES_DB:-events}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: eventshandler-redis
    restart: unless-stopped
    # Порт наружу не публикуем — бэкенд обращается к Redis по внутренней сети.
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    container_name: eventshandler-backend
    restart: unless-stopped
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-events}:${POSTGRES_PASSWORD:-events}@db:5432/${POSTGRES_DB:-events}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-me-in-production}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      ADMIN_EMAILS: ${ADMIN_EMAILS:-}
    expose:
      - "8000"
    # На loopback: наружу API ходит через фронтенд-прокси (/api). Прямой доступ — только локально.
    ports:
      - "127.0.0.1:${BACKEND_PORT:-8002}:8002"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:8002/').status==200 else sys.exit(1)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api/v1
    container_name: eventshandler-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # ВАЖНО: хранит полученные сертификаты между перезапусками,
      # иначе Caddy будет каждый раз запрашивать новый и упрётся в лимит Let's Encrypt.
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend

volumes:
  pgdata:
  caddy_data:
  caddy_config:
